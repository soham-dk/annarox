
services:
  postgres:
    image: postgres:15
    container_name: park24-postgres
    environment:
      POSTGRES_DB: park24
      POSTGRES_USER: park24_user
      POSTGRES_PASSWORD: park24_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

