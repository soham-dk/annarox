spring:
  application:
    name: park24-backend

  cloud:
     aws:
      credentials:
       access-key: your key
       secret-key: your key
      region:
       static: ap-south-1
      s3:
       bucket: park24-properties-bucket

  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/annarox
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update        # Flyway handles schema, not Hibernate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
      # jakarta:
