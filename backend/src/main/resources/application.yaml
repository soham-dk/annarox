server:
  port: 8080

jwt:
  secret: ahgvasdchbalcaufhbvkjancucfdehwe8r84r4fjbvew
  expiry-ms: 3600000        # 1 hour
  refresh-expiry-ms: 86400000  # 24 hours

# app:
#   rate-limit:
#     requests-per-minute: 100
#   idempotency:
#     ttl-hours: 24

logging:
  level:
    com.annarox: DEBUG
    # com.flyway-db: INFO
    # org.springframework.kafka: INFO

springdoc:
  # Changes the default /swagger-ui/index.html to /swagger-ui.html
  swagger-ui:
    path: /swagger-ui.html
    # Keeps your API operations sorted alphabetically
    operations-sorter: alpha
    # Enables the "Try it out" button by default
    try-it-out-enabled: true
  # Changes the JSON documentation path (default is /v3/api-docs)
  api-docs:
    path: /api-docs
  # Shows the time it took for the request to complete in the UI
  show-actuator: true
