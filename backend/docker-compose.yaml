  #     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  #     KAFKA_AUTO_CREATE_TOPICS_ENABLE: true

  pgadmin:
    image: dpage/pgadmin4
    container_name: park24-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@park24.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres    

volumes:
  postgres_data: